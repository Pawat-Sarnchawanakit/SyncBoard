<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SyncBoard</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: #f9fafb;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
}

/* Container styles */
.container {
    background-color: #ffffff;
    border-radius: 0.75rem;
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    padding: 2rem;
    max-width: 28rem;
    width: 100%;
}

/* Header styles */
.header {
    text-align: center;
    margin-bottom: 1.5rem;
}

.header h1 {
    font-size: 1.875rem;
    font-weight: 700;
    color: #111827;
}

.header p {
    color: #6b7280;
    margin-top: 0.5rem;
}

/* Form styles */
.form-group {
    margin-bottom: 1.5rem;
}

.form-group label {
    display: block;
    font-size: 0.875rem;
    font-weight: 500;
    color: #374151;
    margin-bottom: 0.25rem;
}

.form-control {
    width: 100%;
    padding: 0.5rem 1rem;
    border: 1px solid #d1d5db;
    border-radius: 0.5rem;
    transition: all 0.2s ease;
    font-size: 1rem;
}

.form-control:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, 0.25);
}

/* Button styles */
.btn {
    width: 100%;
    background-color: #3b82f6;
    color: #ffffff;
    font-weight: 500;
    padding: 0.5rem 1rem;
    border-radius: 0.5rem;
    transition: all 0.3s ease;
    font-size: 1rem;
    cursor: pointer;
}

.btn:hover {
    background-color: #2563eb;
}

/* Link styles */
.link {
    color: #3b82f6;
    text-decoration: none;
    font-weight: 500;
    transition: color 0.3s ease;
}

.link:hover {
    color: #1d4ed8;
}

/* Footer styles */
.footer {
    margin-top: 1.5rem;
    text-align: center;
}

.footer p {
    color: #6b7280;
}

/* Responsive adjustments */
@media (max-width: 768px) {
    .container {
        padding: 1.5rem;
        max-width: 90%;
    }
    
    .header h1 {
        font-size: 1.5rem;
    }
}

</style>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Log In</h1>
            <p>Join SyncBoard for real-time collaboration</p>
        </div>
        
        <form id="signup-form" class="space-y-6">
            <div class="form-group">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    required 
                    class="form-control"
                    placeholder="Enter your username"
                >
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    required 
                    class="form-control"
                    placeholder="Enter your password"
                >
            </div>
            
            <button type="submit" class="btn">
                Log In
            </button>
        </form>
        
        <div class="footer">
            <p>
                Don't have an account? 
                <a href="/signup" class="link">
                    Sign up here
                </a>
            </p>
        </div>
    </div>

    <script>feather.replace();</script>
</body>
</html>
